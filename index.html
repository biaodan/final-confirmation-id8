<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özel Müşteri Temsilcisi</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #ffffff; color: #333; }
        .wrapper { text-align: center; width: 90%; max-width: 350px; padding: 20px; }
        
        /* 圆形头像 */
        .avatar { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 15px; border: 4px solid #f0f2f5; }
        
        /* 名字 */
        .name { font-size: 24px; font-weight: 700; margin: 0 0 8px 0; color: #1c1e21; }
        
        /* 描述 */
        .desc { font-size: 16px; line-height: 1.6; color: #65676b; margin-bottom: 35px; padding: 0 10px; }
        .desc strong { color: #075E54; } 

        /* 按钮：土耳其风格的绿色加宽按钮 */
        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: #25D366; color: white; text-decoration: none; padding: 18px; border-radius: 50px; font-weight: 700; font-size: 19px; box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4); }
        .btn:active { transform: scale(0.96); }
        
        .id-notice { font-size: 11px; color: #ced4da; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="wrapper">
        
        <img src=<img src="isabela.jpg" alt="Isabela Princess" class="avatar">
        
        <p class="name">Isabela Princess</p>
        
        <p class="desc">
            Merhaba! Ben sizin <strong>özel karşılama temsilcinizim</strong>. Benimle WhatsApp üzerinden hemen konuşmaya başlamak için aşağıdaki butona tıklayın!
        </p>
